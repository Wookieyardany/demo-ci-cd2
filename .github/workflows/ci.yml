name: CI - Integracion Continua

on:
 push:
 pull_request:
  branches: [main]
  
jobs:
 build-y-pruebas:
  runs-on: ubuntu-latest
  steps:
   - uses: actions/checkout@v5
   - name: Construir la imagen Docker
     run: docker build -t demo-ci .
   - name: Correr las pruebas dentro del contenedor
     run: docker run demo-ci
     
 desplegar:
  needs: build-y-pruebas
  if: github.ref == 'refs/heads/main'
  runs-on: ubuntu-latest
  permissions:
   contents: read
   pages: write
   id-token: write
  environment:
   name: github-pages
   url: ${{ steps.deployment.outputs.page_url }}
  steps:
   - uses: actions/checkout@v5
   - uses: actions/configure-pages@v5
   - uses: actions/upload-pages-artifact@v4
     with:
      path: sitio
   - id: deployment
     uses: actions/deploy-pages@v4
